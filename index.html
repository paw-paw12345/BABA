<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agape Admission Portal</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            
        }
        h1 {
            text-align: center;
            color: #ffffff;
            padding: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            text-align: center;
            color: #e0e0e0;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .submit-btn {
            background: #00c6ff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s ease;
        }
        .submit-btn:hover {
            background: #0072ff;
        }
        #submitted-message {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Agape Admission Portal</h1>
    <p>Request for the 2026 Academic Year</p>
    
    <div class="form-container"> 
        <form id="RegistrationForm">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email</label>   
                    <input type="text" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone" required>
                </div>            
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" min="3" max="19" required>
            </div>
            <div class="form-group">
                <label for="grade">Grade Applying For</label>
                <select id="grade" name="grade" required>
                    <option value="">Choose A Grade</option>
                    <option value="Kindergarten">Kindergarten</option>
                    <option value="Grade1">Grade 1</option>
                    <option value="Grade2">Grade 2</option>
                    <option value="Grade3">Grade 3</option>
                    <option value="Grade4">Grade 4</option>
                    <option value="Grade5">Grade 5</option>
                    <option value="Grade6">Grade 6</option>
                    <option value="Grade7">Grade 7</option>
                    <option value="Grade8">Grade 8</option>
                    <option value="Grade9">Grade 9</option>
                    <option value="Grade10">Grade 10</option>
                    <option value="Grade11">Grade 11</option>
                    <option value="Grade12">Grade 12</option>
                </select>
            </div>
            <div class="form-group">
                <label for="previousSchool">Previous School</label>
                <input type="text" id="previousSchool" name="previousSchool" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Tell us more about yourself..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit Form</button>
        </form>

        <div id="submitted-message">
            <h3>Form Successfully Submitted</h3>
            <p>Thank you for submitting your form.</p>
        </div>
    </div>
</body>
</html>
